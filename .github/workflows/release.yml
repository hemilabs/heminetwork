# GitHub Actions workflow to create releases.
# Releases are published from tags matching "v*.*.*".
name: "Release"
on:
  push:
    tags: [ "v*.*.*" ]

concurrency:
  group: "release-${{ github.ref }}"
  cancel-in-progress: true

env:
  # renovate: datasource=github-releases depName=goreleaser/goreleaser versioning=semver
  GORELEASER_VERSION: "v2.16.0"

permissions:
  contents: read

jobs:
  # Build and test
  test-go:
    name: "Test (Go)"
    permissions:
      contents: read
    uses: ./.github/workflows/go.yml

  # Create GitHub Release
  release:
    name: "Release"
    runs-on: "ubuntu-latest"
    needs: [ "test-go" ]
    environment:
      name: release
      deployment: false
    permissions:
      contents: write # Required to create GitHub releases.
      id-token: write # Required for Sigstore cosign authentication.
      packages: write # Required to publish to GitHub Container Registry.
      attestations: write # Required to create attestations.
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: "Setup Go"
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: "go.mod"
          cache: false

      - name: "Install cosign"
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: "Install Syft"
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: "Setup QEMU"
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: "Setup Docker Buildx"
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: "Login to DockerHub"
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: "${{ secrets.DOCKERHUB_USERNAME }}"
          password: "${{ secrets.DOCKERHUB_TOKEN }}"

      - name: "Login to GitHub Container Registry"
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: "ghcr.io"
          username: "${{ github.repository_owner }}"
          password: "${{ secrets.GITHUB_TOKEN }}"

      - name: "Release"
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: "goreleaser"
          version: "${{ env.GORELEASER_VERSION }}"
          args: "release --clean"
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: "Get version"
        id: version
        run: |
          VERSION=$(cat './dist/metadata.json' | jq -r '.version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: "Attest release artifacts"
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-checksums: "./dist/heminetwork_v${{ steps.version.outputs.version }}_checksums.txt"

      - name: "Attest release images"
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-checksums: "./dist/heminetwork_v${{ steps.version.outputs.version }}_image_digests.txt"

      - name: "Attest checksums file"
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "./dist/heminetwork_v${{ steps.version.outputs.version }}_checksums.txt"
