# GitHub Actions workflow to lint, build and test.
name: "Go"
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
  workflow_call:

concurrency:
  group: "go-${{ github.workflow }}-${{ github.event.number || github.ref }}"
  cancel-in-progress: "${{ github.event_name == 'pull_request' }}"

env:
  # renovate: datasource=github-releases depName=golangci/golangci-lint versioning=semver
  GOLANGCI_LINT_VERSION: "v2.12.2"
  # renovate: datasource=github-releases depName=joshuasing/golicenser versioning=semver
  GOLICENSER_VERSION: "v0.3.1"

permissions:
  contents: read

jobs:
  lint:
    name: "Lint"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: "Setup Go"
        id: "go"
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"

      - name: "golangci-lint"
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: "${{ env.GOLANGCI_LINT_VERSION }}"

      - name: "golangci-lint fmt"
        run: golangci-lint fmt --diff ./...

      - name: "Cache golicenser"
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: "/home/runner/go/bin/golicenser"
          key: "${{ runner.os }}-golicenser-${{ env.GOLICENSER_VERSION }}-go${{ steps.go.outputs.go-version }}"

      - name: "golicenser"
        env:
          LICENSE_HEADER: |
            Copyright (c) {{.year}} {{.author}}
            Use of this source code is governed by the MIT License,
            which can be found in the LICENSE file.
        run: |
          if ! (command -v 'golicenser' >/dev/null); then
            go install github.com/joshuasing/golicenser/cmd/golicenser@$GOLICENSER_VERSION
          fi
          echo "$LICENSE_HEADER" > license_header.txt
          golicenser -author="Hemi Labs, Inc." -year-mode=git-range ./...

  build:
    name: "Build"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: "Setup Go"
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"

      - name: "Download and verify dependencies"
        id: deps
        run: GOCACHE="$(go env GOCACHE)" make go-deps

      - name: "make build"
        run: GOCACHE="$(go env GOCACHE)" make build

  test:
    name: "Test"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: "Setup Go"
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"

      - name: "Download and verify dependencies"
        run: GOCACHE="$(go env GOCACHE)" make go-deps

      - name: "test synctest"
        run: GOCACHE="$(go env GOCACHE)" make synctest

      - name: "make test (with E2E tests)"
        env:
          HEMI_DOCKER_TESTS: "1"
        run: GOCACHE="$(go env GOCACHE)" make test

      - name: "Upload coverage reports to Codecov"
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage.out
          token: "${{ secrets.CODECOV_TOKEN }}"

  test-race:
    name: "Test (race)"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: "Setup Go"
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"

      - name: "Download and verify dependencies"
        id: deps
        run: GOCACHE="$(go env GOCACHE)" make go-deps

      - name: "make race"
        run: GOCACHE="$(go env GOCACHE)" make race
