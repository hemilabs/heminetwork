# GitHub Actions workflow to automatically label pull requests.
name: "Label"
on:
  pull_request_target:
    branches: ["main"]
    types: ["opened", "synchronize", "labeled", "unlabeled"]

jobs:
  labeler:
    name: "Pull Request"
    runs-on: "ubuntu-latest"
    permissions:
      pull-requests: write
    steps:
      - name: "Label pull requests"
        uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6.1.0

      - name: "Update changelog labels"
        uses: hemilabs/actions/changelog-labeler@8f87619b7f0122c39e14a32514ab3e4e0d4c3966 # v2.3.0
        with:
          changelog-path: "CHANGELOG.md"
          label-required: "changelog: required"
          label-skip: "changelog: skip"
          label-done: "changelog: done"
          required: true
